<body>
    <div id="root"></div>

    <script>
        // Procesar callback de Strava ANTES de que React se monte
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                sessionStorage.setItem('strava_pending_code', code);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        })();

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyD4elYscOA-zDdGXT7QoCLoYMKy1l6ZkXk",
            authDomain: "lin-de-cubel.firebaseapp.com",
            projectId: "lin-de-cubel",
            storageBucket: "lin-de-cubel.firebasestorage.app",
            messagingSenderId: "461095009880",
            appId: "1:461095009880:web:0ab557f79cc6500d99142d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function ClubCiclistaApp() {
            const [session, setSession] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentSocio, setCurrentSocio] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [activeTab, setActiveTab] = useState('salidas');
            const [loginView, setLoginView] = useState('select');
            const [loginForm, setLoginForm] = useState({ email: '', password: '' });
            const [registerForm, setRegisterForm] = useState({ email: '', password: '', nombre: '', apellidos: '', dni: '', telefono: '', fechaNacimiento: '', direccion: '' });
            const [socios, setSocios] = useState([]);
            const [salidas, setSalidas] = useState([]);
            const [productos, setProductos] = useState([]);
            const [inscripciones, setInscripciones] = useState([]);
            const [stravaStats, setStravaStats] = useState([]);
            const [compras, setCompras] = useState([]);
            const [nuevaSalida, setNuevaSalida] = useState({ nombre: '', fecha: '', hora: '', distancia: '', desnivel: '', nivel: 'Intermedio', punto_encuentro: '' });
            const [mostrarFormSalida, setMostrarFormSalida] = useState(false);
            const [socioParaApuntar, setSocioParaApuntar] = useState({}); // salidaId → socioId seleccionado
            const [nombreExterno, setNombreExterno] = useState({}); // salidaId → nombre de no socio
            const [mostrarFormNuevoSocio, setMostrarFormNuevoSocio] = useState(false);
            const [formNuevoSocio, setFormNuevoSocio] = useState({ nombre:'', apellidos:'', email:'', dni:'', telefono:'', fecha_nacimiento:'', direccion:'', numero_socio:'', cuota_pagada:false, fecha_pago:'' });
            const [nuevoProducto, setNuevoProducto] = useState({ nombre: '', precio: '', imagen: '', imagenFile: null, stock_xs: 0, stock_s: 0, stock_m: 0, stock_l: 0, stock_xl: 0, stock_xxl: 0 });
            const [mostrarFormProducto, setMostrarFormProducto] = useState(false);
            const [productoEditando, setProductoEditando] = useState(null);
            const [carrito, setCarrito] = useState([]);
            const [verHistorial, setVerHistorial] = useState(false);
            const [stravaClientId, setStravaClientId] = useState(localStorage.getItem('strava_client_id') || '198014');
            const [stravaClientSecret, setStravaClientSecret] = useState(localStorage.getItem('strava_client_secret') || '548ff8c22c19845540c127de169de40737bedb95');
            const [mostrarConfigStrava, setMostrarConfigStrava] = useState(false);
            const [logoClub, setLogoClub] = useState(localStorage.getItem('logo_club') || '');
            const [editandoLogo, setEditandoLogo] = useState(false);
            const [socioEditando, setSocioEditando] = useState(null);
            const [formEditSocio, setFormEditSocio] = useState({});
            const stravaProcessing = useRef(false);

            // ======== AUTH ========
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        setSession(user);
                        await loadUserData(user);
                    } else {
                        setSession(null);
                        setCurrentSocio(null);
                        setIsAdmin(false);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => { if (session) loadAllData(); }, [session]);

            useEffect(() => {
                if (stravaClientId && !localStorage.getItem('strava_client_id')) localStorage.setItem('strava_client_id', stravaClientId);
                if (stravaClientSecret && !localStorage.getItem('strava_client_secret')) localStorage.setItem('strava_client_secret', stravaClientSecret);
            }, []);

            // Strava OAuth callback
            useEffect(() => {
                if (isAdmin) { sessionStorage.removeItem('strava_pending_code'); return; }
                const pendingCode = sessionStorage.getItem('strava_pending_code');
                if (pendingCode && currentSocio) {
                    if (stravaProcessing.current) return;
                    stravaProcessing.current = true;
                    sessionStorage.removeItem('strava_pending_code');
                    const clientId = stravaClientId || localStorage.getItem('strava_client_id');
                    const clientSecret = stravaClientSecret || localStorage.getItem('strava_client_secret');
                    fetch('https://www.strava.com/oauth/token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ client_id: clientId, client_secret: clientSecret, code: pendingCode, grant_type: 'authorization_code' })
                    }).then(r => r.json()).then(async data => {
                        if (data.access_token) {
                            await db.collection('socios').doc(currentSocio.id).update({
                                strava_access_token: data.access_token,
                                strava_refresh_token: data.refresh_token,
                                strava_connected: true
                            });
                            const docSnap = await db.collection('socios').doc(currentSocio.id).get();
                            setCurrentSocio({ id: docSnap.id, ...docSnap.data() });
                            alert('✅ ¡Conectado con Strava!');
                            loadAllData();
                        } else alert('Error al conectar con Strava: ' + JSON.stringify(data));
                        stravaProcessing.current = false;
                    }).catch(e => { alert('Error: ' + e.message); stravaProcessing.current = false; });
                }
            }, [currentSocio, isAdmin]);

            const loadUserData = async (user) => {
                const snap = await db.collection('socios').where('user_id', '==', user.uid).limit(1).get();
                if (!snap.empty) setCurrentSocio({ id: snap.docs[0].id, ...snap.docs[0].data() });
            };

            const loadAllData = async () => {
                try {
                    const sociosSnap = await db.collection('socios').get();
                    const sociosData = sociosSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    sociosData.sort((a, b) => {
                        if (!a.numero_socio && !b.numero_socio) return 0;
                        if (!a.numero_socio) return 1;
                        if (!b.numero_socio) return -1;
                        return (a.numero_socio || 0) - (b.numero_socio || 0);
                    });
                    setSocios(sociosData);

                    const salidasSnap = await db.collection('salidas').get();
                    const salidasData = salidasSnap.docs.map(d => {
                        const data = d.data();
                        const proponente = data.propuesta_por ? sociosData.find(s => s.id === data.propuesta_por) : null;
                        return { id: d.id, ...data, propuesta_por_socio: proponente ? { nombre: proponente.nombre, apellidos: proponente.apellidos } : null };
                    });
                    salidasData.sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''));
                    setSalidas(salidasData);

                    const productosSnap = await db.collection('productos').get();
                    setProductos(productosSnap.docs.map(d => ({ id: d.id, ...d.data() })));

                    const inscripcionesSnap = await db.collection('inscripciones').get();
                    setInscripciones(inscripcionesSnap.docs.map(d => ({ id: d.id, ...d.data() })));

                    const stravaSnap = await db.collection('strava_stats').get();
                    const stravaData = stravaSnap.docs.map(d => {
                        const data = d.data();
                        const socio = sociosData.find(s => s.id === data.socio_id);
                        return { id: d.id, ...data, socios: socio ? { nombre: socio.nombre, apellidos: socio.apellidos, numero_socio: socio.numero_socio } : null };
                    });
                    setStravaStats(stravaData);

                    const comprasSnap = await db.collection('compras').get();
                    const comprasData = comprasSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    comprasData.sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''));
                    setCompras(comprasData);
                } catch(e) { console.error('Error loadAllData:', e); }
            };

            // ======== AUTH FUNCTIONS ========
            const loginAdmin = async () => {
                try {
                    await auth.signInWithEmailAndPassword('bttlindecubel@gmail.com', loginForm.password);
                    setIsAdmin(true);
                    setLoginView('select');
                    alert('¡Bienvenido Administrador!');
                } catch(e) { alert('Contraseña incorrecta'); }
            };

            const loginSocio = async () => {
                try {
                    await auth.signInWithEmailAndPassword(loginForm.email, loginForm.password);
                } catch(e) { alert('Email o contraseña incorrectos'); }
            };

            const registerSocio = async () => {
                if (!registerForm.email || !registerForm.password || !registerForm.nombre || !registerForm.apellidos || !registerForm.dni) {
                    alert('Completa los campos obligatorios (*)'); return;
                }
                try {
                    // Crear cuenta Auth primero (sin estar autenticado no podemos leer Firestore)
                    const { user } = await auth.createUserWithEmailAndPassword(registerForm.email, registerForm.password);
                    // Ahora ya estamos autenticados → podemos consultar Firestore
                    const snap = await db.collection('socios').where('email', '==', registerForm.email).limit(1).get();
                    if (!snap.empty) {
                        // Socio ya existe → vincular con la nueva cuenta de Firebase Auth
                        const docRef = snap.docs[0].ref;
                        await docRef.update({ user_id: user.uid });
                        alert('✅ ¡Cuenta vinculada correctamente!\n\nTus datos de socio se han conservado. Ya puedes iniciar sesión.');
                    } else {
                        // Socio nuevo → crear documento en Firestore
                        await db.collection('socios').add({
                            user_id: user.uid, email: registerForm.email, nombre: registerForm.nombre,
                            apellidos: registerForm.apellidos, dni: registerForm.dni,
                            telefono: registerForm.telefono || '', fecha_nacimiento: registerForm.fechaNacimiento || null,
                            direccion: registerForm.direccion || '', cuota_pagada: false, fecha_pago: null,
                            numero_socio: null, strava_connected: false, strava_access_token: null,
                            strava_refresh_token: null, createdAt: new Date().toISOString()
                        });
                        alert('✅ ¡Registro exitoso!\n\nYa puedes iniciar sesión con tu email y contraseña.');
                    }
                    setRegisterForm({ email: '', password: '', nombre: '', apellidos: '', dni: '', telefono: '', fechaNacimiento: '', direccion: '' });
                    setLoginView('select');
                } catch(e) {
                    if (e.code === 'auth/email-already-in-use') alert('⚠️ Este email ya tiene cuenta en Firebase. Inicia sesión o usa "¿Olvidaste tu contraseña?".');
                    else alert('❌ Error: ' + e.message + '\n\nContacta: bttlindecubel@gmail.com');
                }
            };

            const logout = async () => {
                if (isAdmin) { setIsAdmin(false); }
                await auth.signOut();
                setSession(null); setCurrentSocio(null);
            };

            const recuperarPassword = async () => {
                if (!loginForm.email) { alert('Introduce tu email primero'); return; }
                try {
                    await auth.sendPasswordResetEmail(loginForm.email);
                    alert('✅ Email de recuperación enviado.\nRevisa tu bandeja de entrada.');
                    setLoginView('select');
                } catch(e) { alert('Error: ' + e.message); }
            };

            // ======== EXPORTAR ========
            const exportarSociosExcel = () => {
                if (!isAdmin) return;
                const datosExcel = socios.map(s => ({
                    'Nº Socio': s.numero_socio || '-', 'Nombre': s.nombre, 'Apellidos': s.apellidos,
                    'Email': s.email, 'DNI': s.dni, 'Teléfono': s.telefono,
                    'Fecha Nacimiento': s.fecha_nacimiento, 'Dirección': s.direccion,
                    'Cuota Pagada': s.cuota_pagada ? 'SÍ' : 'NO', 'Fecha Pago': s.fecha_pago || '-',
                    'Fecha Registro': s.createdAt ? new Date(s.createdAt).toLocaleDateString() : '-'
                }));
                const ws = XLSX.utils.json_to_sheet(datosExcel);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Socios');
                XLSX.writeFile(wb, `Socios_LinDeCubel_${new Date().toLocaleDateString()}.xlsx`);
                alert('✅ Exportado correctamente');
            };

            const exportarInscritosExcel = (salidaId) => {
                if (!isAdmin) return;
                const salida = salidas.find(s => s.id === salidaId);
                if (!salida) return;
                const inscritos = inscripciones.filter(i => i.salida_id === salidaId);
                const datosExcel = inscritos.map(i => {
                    const socio = socios.find(s => s.id === i.socio_id);
                    return { 'Nº Socio': socio?.numero_socio || (i.nombre_externo ? 'NO SOCIO' : '-'), 'Nombre': socio?.nombre || i.nombre_externo || '-', 'Apellidos': socio?.apellidos || '', 'Email': socio?.email || '-', 'Teléfono': socio?.telefono || '-', 'Cuota Pagada': socio ? (socio.cuota_pagada ? 'SÍ' : 'NO') : 'N/A' };
                });
                const ws = XLSX.utils.json_to_sheet(datosExcel);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Inscritos');
                XLSX.writeFile(wb, `Inscritos_${salida.nombre.replace(/\s/g,'_')}_${new Date().toLocaleDateString()}.xlsx`);
                alert(`✅ Exportados`);
            };

            const exportarPedidosExcel = () => {
                if (!isAdmin) return;
                const datosExcel = compras.map(c => {
                    const socio = socios.find(s => s.id === c.socio_id);
                    const items = typeof c.items === 'string' ? JSON.parse(c.items) : c.items;
                    return {
                        'ID Pedido': c.id.substring(0,8), 'Fecha': c.fecha,
                        'Cliente': socio ? `${socio.nombre} ${socio.apellidos}` : '-',
                        'Email': socio?.email || '-', 'Teléfono': socio?.telefono || '-',
                        'Artículos': items.map(i => `${i.nombre} (${i.talla})`).join(', '),
                        'Total': `${c.total}€`, 'Estado': c.preparado ? 'PREPARADO' : 'PENDIENTE'
                    };
                });
                const ws = XLSX.utils.json_to_sheet(datosExcel);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Pedidos');
                XLSX.writeFile(wb, `Pedidos_LinDeCubel_${new Date().toLocaleDateString()}.xlsx`);
                alert('✅ Exportado');
            };

            // ======== SOCIOS ========
            const pagarCuota = async (socioId) => {
                await db.collection('socios').doc(socioId).update({ cuota_pagada: true, fecha_pago: new Date().toISOString().split('T')[0] });
                alert('Cuota marcada como pagada'); loadAllData();
            };

            const abrirEditSocio = (socio) => {
                setSocioEditando(socio.id);
                setFormEditSocio({ numero_socio: socio.numero_socio || '', nombre: socio.nombre || '', apellidos: socio.apellidos || '', email: socio.email || '', dni: socio.dni || '', telefono: socio.telefono || '', fecha_nacimiento: socio.fecha_nacimiento || '', direccion: socio.direccion || '', cuota_pagada: socio.cuota_pagada || false, fecha_pago: socio.fecha_pago || '' });
            };

            const guardarEditSocio = async (socioId) => {
                await db.collection('socios').doc(socioId).update({
                    numero_socio: formEditSocio.numero_socio ? parseInt(formEditSocio.numero_socio) : null,
                    nombre: formEditSocio.nombre, apellidos: formEditSocio.apellidos, email: formEditSocio.email,
                    dni: formEditSocio.dni, telefono: formEditSocio.telefono,
                    fecha_nacimiento: formEditSocio.fecha_nacimiento || null, direccion: formEditSocio.direccion,
                    cuota_pagada: formEditSocio.cuota_pagada, fecha_pago: formEditSocio.fecha_pago || null
                });
                setSocioEditando(null); loadAllData();
            };

            // ======== SALIDAS ========
            const crearSalida = async () => {
                if (!isAdmin || !nuevaSalida.nombre || !nuevaSalida.fecha || !nuevaSalida.hora) { alert('Completa los campos obligatorios'); return; }
                await db.collection('salidas').add({ nombre: nuevaSalida.nombre, fecha: nuevaSalida.fecha, hora: nuevaSalida.hora, distancia: parseInt(nuevaSalida.distancia) || 0, desnivel: parseInt(nuevaSalida.desnivel) || 0, nivel: nuevaSalida.nivel, punto_encuentro: nuevaSalida.punto_encuentro, propuesta_por: null });
                alert('Salida oficial creada');
                setNuevaSalida({ nombre: '', fecha: '', hora: '', distancia: '', desnivel: '', nivel: 'Intermedio', punto_encuentro: '' });
                setMostrarFormSalida(false); loadAllData();
            };

            const proponerSalida = async () => {
                if (!currentSocio || !nuevaSalida.nombre || !nuevaSalida.fecha || !nuevaSalida.hora) { alert('Completa los campos obligatorios'); return; }
                await db.collection('salidas').add({ nombre: nuevaSalida.nombre, fecha: nuevaSalida.fecha, hora: nuevaSalida.hora, distancia: parseInt(nuevaSalida.distancia) || 0, desnivel: parseInt(nuevaSalida.desnivel) || 0, nivel: nuevaSalida.nivel, punto_encuentro: nuevaSalida.punto_encuentro, propuesta_por: currentSocio.id });
                alert('✅ Salida propuesta con éxito!');
                setNuevaSalida({ nombre: '', fecha: '', hora: '', distancia: '', desnivel: '', nivel: 'Intermedio', punto_encuentro: '' });
                setMostrarFormSalida(false); loadAllData();
            };

            const cancelarPropuesta = async (salidaId, propuestaPor) => {
                if (!currentSocio && !isAdmin) return;
                if (!isAdmin && currentSocio.id !== propuestaPor) { alert('Solo puedes cancelar tus propias propuestas'); return; }
                if (!confirm('¿Cancelar esta salida?')) return;
                await db.collection('salidas').doc(salidaId).delete();
                loadAllData();
            };

            const inscribirseASalida = async (salidaId) => {
                const yaInscrito = inscripciones.some(i => i.salida_id === salidaId && i.socio_id === currentSocio?.id);
                if (yaInscrito) { alert('Ya estás inscrito'); return; }
                await db.collection('inscripciones').add({ salida_id: salidaId, socio_id: currentSocio.id });
                loadAllData();
            };

            const desinscribirseASalida = async (salidaId) => {
                const inscripcion = inscripciones.find(i => i.salida_id === salidaId && i.socio_id === currentSocio?.id);
                if (!inscripcion) return;
                await db.collection('inscripciones').doc(inscripcion.id).delete();
                loadAllData();
            };

            const eliminarInscripcion = async (inscripcionId) => {
                if (!isAdmin) return;
                if (!confirm('¿Eliminar esta inscripción?')) return;
                await db.collection('inscripciones').doc(inscripcionId).delete();
                loadAllData();
            };

            const apuntarSocioASalida = async (salidaId) => {
                if (!isAdmin) return;
                const socioId = socioParaApuntar[salidaId];
                if (!socioId) { alert('Selecciona un socio primero'); return; }
                const yaInscrito = inscripciones.some(i => i.salida_id === salidaId && i.socio_id === socioId);
                if (yaInscrito) { alert('Este socio ya está inscrito'); return; }
                await db.collection('inscripciones').add({ salida_id: salidaId, socio_id: socioId });
                setSocioParaApuntar(prev => ({ ...prev, [salidaId]: '' }));
                loadAllData();
            };

            const crearSocioManual = async () => {
                if (!isAdmin) return;
                if (!formNuevoSocio.nombre || !formNuevoSocio.apellidos || !formNuevoSocio.email) {
                    alert('Nombre, apellidos y email son obligatorios'); return;
                }
                // Comprobar si el email ya existe
                const snap = await db.collection('socios').where('email', '==', formNuevoSocio.email).limit(1).get();
                if (!snap.empty) { alert('Ya existe un socio con ese email'); return; }
                await db.collection('socios').add({
                    nombre: formNuevoSocio.nombre.trim(),
                    apellidos: formNuevoSocio.apellidos.trim(),
                    email: formNuevoSocio.email.trim().toLowerCase(),
                    dni: formNuevoSocio.dni.trim(),
                    telefono: formNuevoSocio.telefono.trim(),
                    fecha_nacimiento: formNuevoSocio.fecha_nacimiento || null,
                    direccion: formNuevoSocio.direccion.trim(),
                    numero_socio: formNuevoSocio.numero_socio ? parseInt(formNuevoSocio.numero_socio) : null,
                    cuota_pagada: formNuevoSocio.cuota_pagada,
                    fecha_pago: formNuevoSocio.cuota_pagada ? (formNuevoSocio.fecha_pago || new Date().toISOString().split('T')[0]) : null,
                    user_id: null,
                    strava_connected: false,
                    createdAt: new Date().toISOString()
                });
                alert('✅ Socio creado correctamente. Cuando se registre en la app con su email, se vinculará automáticamente.');
                setFormNuevoSocio({ nombre:'', apellidos:'', email:'', dni:'', telefono:'', fecha_nacimiento:'', direccion:'', numero_socio:'', cuota_pagada:false, fecha_pago:'' });
                setMostrarFormNuevoSocio(false);
                loadAllData();
            };

            const apuntarExternoASalida = async (salidaId) => {
                if (!isAdmin) return;
                const nombre = (nombreExterno[salidaId] || '').trim();
                if (!nombre) { alert('Escribe el nombre de la persona'); return; }
                await db.collection('inscripciones').add({ salida_id: salidaId, socio_id: null, nombre_externo: nombre });
                setNombreExterno(prev => ({ ...prev, [salidaId]: '' }));
                loadAllData();
            };

            const eliminarSalida = async (salidaId) => {
                if (!isAdmin || !confirm('¿Eliminar esta salida?')) return;
                await db.collection('salidas').doc(salidaId).delete();
                loadAllData();
            };

            // ======== PRODUCTOS ========
            const uploadImage = async (file) => {
                const ref = storage.ref(`productos/${Date.now()}_${file.name}`);
                const snapshot = await ref.put(file);
                return await snapshot.ref.getDownloadURL();
            };

            const crearProducto = async () => {
                if (!nuevoProducto.nombre || !nuevoProducto.precio) { alert('Nombre y precio son obligatorios'); return; }
                let imagenUrl = '';
                if (nuevoProducto.imagenFile) {
                    try { imagenUrl = await uploadImage(nuevoProducto.imagenFile); }
                    catch(e) { alert('Error al subir imagen: ' + e.message); return; }
                }
                await db.collection('productos').add({
                    nombre: nuevoProducto.nombre, precio: parseFloat(nuevoProducto.precio), imagen: imagenUrl,
                    stock_xs: parseInt(nuevoProducto.stock_xs)||0, stock_s: parseInt(nuevoProducto.stock_s)||0,
                    stock_m: parseInt(nuevoProducto.stock_m)||0, stock_l: parseInt(nuevoProducto.stock_l)||0,
                    stock_xl: parseInt(nuevoProducto.stock_xl)||0, stock_xxl: parseInt(nuevoProducto.stock_xxl)||0
                });
                alert('Producto creado');
                setNuevoProducto({ nombre:'', precio:'', imagen:'', imagenFile:null, stock_xs:0, stock_s:0, stock_m:0, stock_l:0, stock_xl:0, stock_xxl:0 });
                setMostrarFormProducto(false); loadAllData();
            };

            const eliminarProducto = async (productoId) => {
                if (!isAdmin || !confirm('¿Eliminar este producto?')) return;
                await db.collection('productos').doc(productoId).delete();
                alert('Producto eliminado'); loadAllData();
            };

            const actualizarProducto = async () => {
                if (!isAdmin || !productoEditando) return;
                let imagenUrl = productoEditando.imagen || '';
                if (productoEditando.imagenFile) {
                    try { imagenUrl = await uploadImage(productoEditando.imagenFile); }
                    catch(e) { alert('Error al subir imagen: ' + e.message); return; }
                }
                await db.collection('productos').doc(productoEditando.id).update({
                    stock_xs: parseInt(productoEditando.stock_xs)||0, stock_s: parseInt(productoEditando.stock_s)||0,
                    stock_m: parseInt(productoEditando.stock_m)||0, stock_l: parseInt(productoEditando.stock_l)||0,
                    stock_xl: parseInt(productoEditando.stock_xl)||0, stock_xxl: parseInt(productoEditando.stock_xxl)||0,
                    imagen: imagenUrl
                });
                alert('Producto actualizado'); setProductoEditando(null); loadAllData();
            };

            // ======== TIENDA ========
            const agregarAlCarrito = (producto, talla) => {
                const stockField = `stock_${talla.toLowerCase()}`;
                if (producto[stockField] > 0) { setCarrito([...carrito, { ...producto, talla, productoId: producto.id }]); alert(`${producto.nombre} añadido`); }
                else alert('Sin stock');
            };

            const eliminarDelCarrito = (index) => setCarrito(carrito.filter((_,i) => i !== index));

            const procesarCompra = async () => {
                if (carrito.length === 0) return;
                if (!currentSocio) { alert('Debes estar registrado como socio para realizar una compra'); return; }
                try {
                    // 1. Guardar el pedido primero (operación principal)
                    const total = carrito.reduce((sum,item) => sum + item.precio, 0);
                    await db.collection('compras').add({
                        socio_id: currentSocio.id,
                        nombre_socio: `${currentSocio.nombre} ${currentSocio.apellidos}`,
                        total,
                        items: JSON.stringify(carrito),
                        fecha: new Date().toISOString().split('T')[0],
                        preparado: false
                    });
                    // 2. Intentar descontar stock (si falla por permisos no bloquea el pedido)
                    for (const item of carrito) {
                        const stockField = `stock_${item.talla.toLowerCase()}`;
                        const producto = productos.find(p => p.id === item.productoId);
                        try {
                            await db.collection('productos').doc(item.productoId).update({
                                [stockField]: Math.max(0, (producto[stockField]||0) - 1)
                            });
                        } catch (stockErr) {
                            console.warn('Stock no actualizado (el admin deberá hacerlo manualmente):', stockErr.message);
                        }
                    }
                    alert(`✅ ¡Pedido realizado correctamente! Total: ${total}€\nEl administrador lo preparará pronto.`);
                    setCarrito([]);
                    loadAllData();
                } catch (err) {
                    console.error('Error al procesar compra:', err);
                    alert(`❌ Error al realizar el pedido: ${err.message}`);
                }
            };

            const marcarPedidoPreparado = async (compraId) => {
                if (!isAdmin) return;
                await db.collection('compras').doc(compraId).update({ preparado: true });
                alert('Pedido marcado como preparado'); loadAllData();
            };

            const eliminarPedido = async (compraId) => {
                if (!isAdmin || !confirm('¿Eliminar este pedido? Esta acción no se puede deshacer.')) return;
                await db.collection('compras').doc(compraId).delete();
                alert('Pedido eliminado'); loadAllData();
            };

            // ======== STRAVA ========
            const guardarCredencialesStrava = () => {
                localStorage.setItem('strava_client_id', stravaClientId);
                localStorage.setItem('strava_client_secret', stravaClientSecret);
                setMostrarConfigStrava(false); alert('Credenciales guardadas');
            };

            const conectarConStrava = () => {
                if (isAdmin) { alert('La conexión con Strava es solo para socios'); return; }
                if (!stravaClientId) { alert('Configura credenciales primero'); setMostrarConfigStrava(true); return; }
                const scope = 'read,activity:read_all,profile:read_all';
                window.location.href = `https://www.strava.com/oauth/authorize?client_id=${stravaClientId}&response_type=code&redirect_uri=${encodeURIComponent(window.location.origin)}&approval_prompt=force&scope=${scope}`;
            };

            const desconectarStrava = async () => {
                if (!currentSocio) return;
                await db.collection('socios').doc(currentSocio.id).update({ strava_access_token: null, strava_refresh_token: null, strava_connected: false });
                setCurrentSocio({...currentSocio, strava_access_token: null, strava_refresh_token: null, strava_connected: false});
                alert('✅ Strava desconectado');
            };

            const refreshStravaToken = async () => {
                if (!currentSocio?.strava_refresh_token) return false;
                try {
                    const response = await fetch('https://www.strava.com/oauth/token', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ client_id: stravaClientId, client_secret: stravaClientSecret, refresh_token: currentSocio.strava_refresh_token, grant_type: 'refresh_token' }) });
                    const data = await response.json();
                    if (data.access_token) {
                        await db.collection('socios').doc(currentSocio.id).update({ strava_access_token: data.access_token, strava_refresh_token: data.refresh_token });
                        const docSnap = await db.collection('socios').doc(currentSocio.id).get();
                        setCurrentSocio({ id: docSnap.id, ...docSnap.data() });
                        return data.access_token;
                    }
                } catch(e) { console.error('refreshStravaToken:', e); }
                return false;
            };

            const sincronizarStrava = async () => {
                if (!currentSocio?.strava_access_token) { alert('Primero conecta con Strava'); return; }
                try {
                    let token = currentSocio.strava_access_token;
                    let athleteRes = await fetch('https://www.strava.com/api/v3/athlete', { headers: { 'Authorization': `Bearer ${token}` } });
                    if (athleteRes.status === 401) {
                        const nuevoToken = await refreshStravaToken();
                        if (nuevoToken) { token = nuevoToken; athleteRes = await fetch('https://www.strava.com/api/v3/athlete', { headers: { 'Authorization': `Bearer ${token}` } }); }
                        else { alert('⚠️ Sesión de Strava expirada. Reconecta con Strava.'); return; }
                    }
                    const athlete = await athleteRes.json();
                    if (!athlete.id) { alert('Error al obtener datos de Strava'); return; }
                    const statsRes = await fetch(`https://www.strava.com/api/v3/athletes/${athlete.id}/stats`, { headers: { 'Authorization': `Bearer ${token}` } });
                    const stats = await statsRes.json();
                    const kmAno = Math.round((stats.ytd_ride_totals?.distance||0)/1000);
                    const desnivelAno = Math.round(stats.ytd_ride_totals?.elevation_gain||0);
                    const salidasAno = stats.ytd_ride_totals?.count||0;
                    const now = new Date();
                    const inicioMes = new Date(now.getFullYear(), now.getMonth(), 1, 0, 0, 0);
                    const diaSemana = now.getDay();
                    const diasDesdelunes = diaSemana === 0 ? 6 : diaSemana - 1;
                    const inicioSemana = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diasDesdelunes, 0, 0, 0);
                    let actRes = await fetch(`https://www.strava.com/api/v3/athlete/activities?after=${Math.floor(inicioMes.getTime()/1000)}&per_page=200`, { headers: { 'Authorization': `Bearer ${token}` } });
                    if (actRes.status === 401) {
                        const t = await refreshStravaToken();
                        if (t) actRes = await fetch(`https://www.strava.com/api/v3/athlete/activities?after=${Math.floor(inicioMes.getTime()/1000)}&per_page=200`, { headers: { 'Authorization': `Bearer ${t}` } });
                    }
                    let actividades = await actRes.json();
                    if (!Array.isArray(actividades)) { alert('⚠️ Error al obtener actividades'); return; }
                    let kmMes=0, desnivelMes=0, salidasMes=0, kmSemana=0, desnivelSemana=0, salidasSemana=0;
                    actividades.forEach(a => {
                        if (a.type==='Ride'||a.type==='VirtualRide') {
                            kmMes+=a.distance||0; desnivelMes+=a.total_elevation_gain||0; salidasMes++;
                            if (new Date(a.start_date_local) >= inicioSemana) { kmSemana+=a.distance||0; desnivelSemana+=a.total_elevation_gain||0; salidasSemana++; }
                        }
                    });
                    kmMes=Math.round(kmMes/1000); desnivelMes=Math.round(desnivelMes); kmSemana=Math.round(kmSemana/1000); desnivelSemana=Math.round(desnivelSemana);
                    const statsData = { km_mes:kmMes, km_ano:kmAno, desnivel_mes:desnivelMes, desnivel_ano:desnivelAno, salidas_mes:salidasMes, salidas_ano:salidasAno, km_semana:kmSemana, desnivel_semana:desnivelSemana, salidas_semana:salidasSemana };
                    const stravaSnap = await db.collection('strava_stats').where('socio_id','==',currentSocio.id).limit(1).get();
                    if (stravaSnap.empty) await db.collection('strava_stats').add({ socio_id: currentSocio.id, ...statsData });
                    else await stravaSnap.docs[0].ref.update(statsData);
                    alert(`✅ Sincronizado!\nKm año: ${kmAno} | D+año: ${desnivelAno}m\nKm mes: ${kmMes} | D+mes: ${desnivelMes}m\nKm semana: ${kmSemana} | D+sem: ${desnivelSemana}m`);
                    loadAllData();
                } catch(e) { console.error('sincronizarStrava:', e); alert('Error: ' + e.message); }
            };

            // ======== RENDER ========
            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-corp-primary">
                    <div className="text-white text-2xl">Cargando...</div>
                </div>
            );

            if (!session) return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-corp-primary to-corp-dark">
                    <div className="bg-white rounded-lg shadow-2xl p-8 max-w-md w-full mx-4">

                                        {isAdmin && <button onClick={()=>setMostrarFormSalida(!mostrarFormSalida)} className="btn-primary px-4 py-2 rounded">{mostrarFormSalida ? '✕ Cancelar' : '➕ Nueva Salida Oficial'}</button>}
                                        {!isAdmin && currentSocio && <button onClick={()=>setMostrarFormSalida(!mostrarFormSalida)} className="btn-secondary px-4 py-2 rounded">{mostrarFormSalida ? '✕ Cancelar' : '💡 Proponer Salida'}</button>}
                                    </div>
                                </div>
                                {mostrarFormSalida && (
                                    <div className="mb-6 p-4 bg-corp-bg-pale rounded-lg">
                                        <h3 className="font-bold mb-3">{isAdmin ? 'Crear Nueva Salida Oficial' : 'Proponer una Salida'}</h3>
                                        <div className="grid md:grid-cols-2 gap-3">
                                            <input type="text" placeholder="Nombre *" value={nuevaSalida.nombre} onChange={(e)=>setNuevaSalida({...nuevaSalida,nombre:e.target.value})} className="border rounded px-3 py-2"/>
                                            <input type="date" value={nuevaSalida.fecha} onChange={(e)=>setNuevaSalida({...nuevaSalida,fecha:e.target.value})} className="border rounded px-3 py-2"/>
                                            <input type="time" value={nuevaSalida.hora} onChange={(e)=>setNuevaSalida({...nuevaSalida,hora:e.target.value})} className="border rounded px-3 py-2"/>
                                            <input type="number" placeholder="Distancia (km)" value={nuevaSalida.distancia} onChange={(e)=>setNuevaSalida({...nuevaSalida,distancia:e.target.value})} className="border rounded px-3 py-2"/>
                                            <input type="number" placeholder="Desnivel (m)" value={nuevaSalida.desnivel} onChange={(e)=>setNuevaSalida({...nuevaSalida,desnivel:e.target.value})} className="border rounded px-3 py-2"/>
                                            <select value={nuevaSalida.nivel} onChange={(e)=>setNuevaSalida({...nuevaSalida,nivel:e.target.value})} className="border rounded px-3 py-2"><option>Principiante</option><option>Intermedio</option><option>Avanzado</option></select>
                                            <input type="text" placeholder="Punto de encuentro" value={nuevaSalida.punto_encuentro} onChange={(e)=>setNuevaSalida({...nuevaSalida,punto_encuentro:e.target.value})} className="border rounded px-3 py-2 md:col-span-2"/>
                                        </div>
                                        <button onClick={isAdmin ? crearSalida : proponerSalida} className={`px-6 py-2 rounded mt-3 ${isAdmin ? 'btn-primary' : 'btn-secondary'}`}>{isAdmin ? 'Crear Salida Oficial' : '💡 Proponer Salida'}</button>
                                    </div>
                                )}
                                <div className="space-y-4">
                                    {salidas.map(salida => {
                                        const inscritos = inscripciones.filter(i=>i.salida_id===salida.id);
                                        const sociosInscritos = inscritos.map(i=>socios.find(s=>s.id===i.socio_id)).filter(Boolean);
                                        const estaInscrito = inscritos.some(i=>i.socio_id===currentSocio?.id);
                                        const esOficial = !salida.propuesta_por;
                                        const esMiPropuesta = salida.propuesta_por===currentSocio?.id;
                                        const nombreProponente = salida.propuesta_por_socio ? `${salida.propuesta_por_socio.nombre} ${salida.propuesta_por_socio.apellidos}` : null;
                                        return (
                                            <div key={salida.id} className={`border rounded-lg p-4 ${esOficial ? 'border-corp-primary bg-corp-bg-light' : 'border-gray-300'}`}>
                                                <div className="flex justify-between items-start mb-3">
                                                    <div>
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <h3 className="text-xl font-bold">{salida.nombre}</h3>
                                                            {esOficial ? <span className="bg-corp-primary text-white text-xs px-2 py-1 rounded-full">🚴 Oficial</span> : <span className="bg-gray-500 text-white text-xs px-2 py-1 rounded-full">💡 Propuesta por {nombreProponente}</span>}
                                                        </div>
                                                        <p className="text-gray-600">📅 {salida.fecha} • ⏰ {salida.hora}</p>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        {isAdmin && <button onClick={()=>eliminarSalida(salida.id)} className="text-red-600 hover:bg-red-50 px-3 py-1 rounded">🗑️</button>}
                                                        {!isAdmin && esMiPropuesta && <button onClick={()=>cancelarPropuesta(salida.id,salida.propuesta_por)} className="text-red-600 hover:bg-red-50 px-3 py-1 rounded text-sm">✕ Cancelar</button>}
                                                    </div>
                                                </div>
                                                <div className="grid md:grid-cols-3 gap-4 mb-3 text-sm">
                                                    {salida.distancia>0 && <p>📏 Distancia: {salida.distancia} km</p>}
                                                    {salida.desnivel>0 && <p>⛰️ Desnivel: {salida.desnivel} m</p>}
                                                    <p>🏁 Nivel: {salida.nivel}</p>
                                                </div>
                                                {salida.punto_encuentro && <p className="text-sm mb-3">📍 {salida.punto_encuentro}</p>}
                                                <div className="mb-3 p-3 bg-gray-50 rounded">
                                                    <div className="flex justify-between items-center mb-2">
                                                        <p className="font-semibold text-sm">👥 Inscritos ({inscritos.length}):</p>
                                                        {isAdmin && inscritos.length>0 && <button onClick={()=>exportarInscritosExcel(salida.id)} className="btn-primary px-3 py-1 rounded text-xs">📊 Exportar</button>}
                                                    </div>
                                                    {inscritos.length>0 ? <div className="flex flex-wrap gap-2">{[...inscritos].sort((a,b)=>{const sA=socios.find(x=>x.id===a.socio_id);const sB=socios.find(x=>x.id===b.socio_id);if(!a.socio_id&&!b.socio_id)return 0;if(!a.socio_id)return 1;if(!b.socio_id)return -1;return(sA?.numero_socio||9999)-(sB?.numero_socio||9999);}).map(i=>{const s=socios.find(x=>x.id===i.socio_id);const esExterno=!i.socio_id;const etiqueta=s?`${s.numero_socio?`#${s.numero_socio} `:''}${s.nombre} ${s.apellidos}`:`👤 ${i.nombre_externo||'Sin nombre'}`;return(<span key={i.id} className={`flex items-center gap-1 px-3 py-1 rounded-full text-sm ${esExterno?'bg-yellow-100 text-yellow-800':'bg-corp-bg-pale text-corp-secondary'}`}>{etiqueta}{isAdmin&&<button onClick={()=>eliminarInscripcion(i.id)} className="ml-1 text-red-500 hover:text-red-700 font-bold leading-none" title="Eliminar">×</button>}</span>);})}</div> : <p className="text-gray-500 text-sm">Aún no hay inscritos</p>}
                                                    {isAdmin && <div className="mt-2 space-y-2"><div className="flex gap-2 items-center"><select value={socioParaApuntar[salida.id]||''} onChange={e=>setSocioParaApuntar(prev=>({...prev,[salida.id]:e.target.value}))} className="border rounded px-2 py-1 text-sm flex-1"><option value="">— Apuntar socio —</option>{[...socios].sort((a,b)=>(a.apellidos||'').localeCompare(b.apellidos||'')).map(s=><option key={s.id} value={s.id}>{s.numero_socio?`#${s.numero_socio} `:''}{s.apellidos}, {s.nombre}</option>)}</select><button onClick={()=>apuntarSocioASalida(salida.id)} className="btn-primary px-3 py-1 rounded text-sm whitespace-nowrap">➕ Socio</button></div><div className="flex gap-2 items-center"><input type="text" placeholder="Nombre de no socio..." value={nombreExterno[salida.id]||''} onChange={e=>setNombreExterno(prev=>({...prev,[salida.id]:e.target.value}))} className="border rounded px-2 py-1 text-sm flex-1"/><button onClick={()=>apuntarExternoASalida(salida.id)} className="bg-yellow-500 text-white px-3 py-1 rounded text-sm whitespace-nowrap">➕ No socio</button></div></div>}
                                                </div>
                                                <div className="flex items-center justify-end">
                                                    {!isAdmin && currentSocio && (estaInscrito ? <button onClick={()=>desinscribirseASalida(salida.id)} className="bg-red-600 text-white px-4 py-2 rounded text-sm">Desinscribirme</button> : <button onClick={()=>inscribirseASalida(salida.id)} className="btn-primary px-4 py-2 rounded text-sm">Inscribirme</button>)}
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {salidas.length===0 && <div className="text-center py-12 text-gray-500"><p className="text-6xl mb-4">🚴</p><p>No hay salidas programadas</p></div>}
                                </div>
                            </div>
                        )}

                        {activeTab==='tienda' && (
                            <div className="bg-white rounded-lg shadow p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-2xl font-bold">Tienda del Club</h2>
                                    <div className="flex gap-2">
                                        {!isAdmin && <button onClick={()=>setVerHistorial(!verHistorial)} className="btn-secondary px-4 py-2 rounded text-sm">{verHistorial ? '🛒 Ver Productos' : '📦 Mis Compras'}</button>}
                                        {isAdmin && <button onClick={()=>setMostrarFormProducto(!mostrarFormProducto)} className="btn-primary px-4 py-2 rounded">{mostrarFormProducto ? '✕ Cancelar' : '➕ Nuevo Producto'}</button>}
                                    </div>
                                </div>
                                {mostrarFormProducto && isAdmin && (
                                    <div className="mb-6 p-4 bg-corp-bg-pale rounded-lg">
                                        <h3 className="font-bold mb-3">Crear Nuevo Producto</h3>
                                        <div className="grid md:grid-cols-2 gap-3">
                                            <input type="text" placeholder="Nombre *" value={nuevoProducto.nombre} onChange={(e)=>setNuevoProducto({...nuevoProducto,nombre:e.target.value})} className="border rounded px-3 py-2"/>
                                            <input type="number" placeholder="Precio (€) *" value={nuevoProducto.precio} onChange={(e)=>setNuevoProducto({...nuevoProducto,precio:e.target.value})} className="border rounded px-3 py-2"/>
                                            <div className="md:col-span-2">
                                                <label className="block mb-2 font-semibold text-sm">Foto del producto:</label>
                                                <input type="file" accept="image/*" onChange={(e) => {
                                                    const file = e.target.files[0];
                                                    if (file) {
                                                        setNuevoProducto({...nuevoProducto, imagenFile: file, imagen: URL.createObjectURL(file)});
                                                    }
                                                }} className="w-full border rounded px-3 py-2"/>
                                                {nuevoProducto.imagen && <img src={nuevoProducto.imagen} alt="Preview" className="h-32 w-32 object-cover rounded border mt-2"/>}
                                                <p className="text-xs text-gray-500 mt-1">💡 La imagen se sube a Firebase Storage — sin límite de ancho de banda</p>
                                            </div>
                                            <div className="md:col-span-2">
                                                <p className="font-semibold mb-2">Stock por talla:</p>
                                                <div className="grid grid-cols-6 gap-2">
                                                    {['xs','s','m','l','xl','xxl'].map(t => (
                                                        <div key={t}>
                                                            <label className="text-xs uppercase block mb-1">{t}</label>
                                                            <input type="number" min="0" value={nuevoProducto[`stock_${t}`]} onChange={(e)=>setNuevoProducto({...nuevoProducto,[`stock_${t}`]:e.target.value})} className="border rounded px-2 py-1 w-full text-sm"/>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={crearProducto} className="btn-primary px-6 py-2 rounded mt-3">Crear Producto</button>
                                    </div>
                                )}
                                {!verHistorial ? (
                                    <>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
                                            {productos.map(producto => (
                                                <div key={producto.id} className="border rounded-lg p-4 relative">
                                                    {isAdmin && <><button onClick={()=>eliminarProducto(producto.id)} className="absolute top-2 right-12 text-red-600 hover:bg-red-50 px-2 py-1 rounded text-sm">🗑️</button><button onClick={()=>setProductoEditando({...producto})} className="absolute top-2 right-2 text-blue-600 hover:bg-blue-50 px-2 py-1 rounded text-sm">✏️</button></>}
                                                    {producto.imagen ? <img src={producto.imagen} className="w-full h-48 object-cover rounded mb-3" alt={producto.nombre}/> : <div className="w-full h-48 bg-gray-200 rounded mb-3 flex items-center justify-center text-6xl">📦</div>}
                                                    <h3 className="font-bold">{producto.nombre}</h3>
                                                    <p className="text-corp-primary font-bold text-xl">{producto.precio}€</p>
                                                    {!isAdmin && (
                                                        <div className="mt-3 grid grid-cols-3 gap-2">
                                                            {['XS','S','M','L','XL','XXL'].map(talla => {
                                                                const sf = `stock_${talla.toLowerCase()}`;
                                                                const stock = producto[sf];
                                                                return <button key={talla} onClick={()=>agregarAlCarrito(producto,talla)} disabled={stock===0} className={`px-2 py-1 rounded text-sm ${stock>0 ? 'btn-primary' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}>{talla} ({stock})</button>;
                                                            })}
                                                        </div>
                                                    )}
                                                    {isAdmin && (
                                                        <div className="mt-3">
                                                            {productoEditando?.id===producto.id ? (
                                                                <div className="border border-blue-300 rounded p-3 bg-blue-50">
                                                                    <p className="font-semibold mb-2 text-sm">Editar Producto:</p>
                                                                    <div className="mb-3">
                                                                        <label className="text-xs font-semibold block mb-1">📷 Imagen</label>
                                                                        {productoEditando.imagen && <img src={productoEditando.imagen} alt="actual" className="h-20 w-20 object-cover rounded border mb-2"/>}
                                                                        <input type="file" accept="image/*" onChange={(e)=>{ const f=e.target.files[0]; if(f){ setProductoEditando({...productoEditando, imagenFile:f, imagen:URL.createObjectURL(f)}); } }} className="w-full text-sm border rounded px-2 py-1"/>
                                                                        <p className="text-xs text-gray-500 mt-1">Selecciona una imagen para cambiarla</p>
                                                                    </div>
                                                                    <p className="text-xs font-semibold mb-1">📦 Stock por talla:</p>
                                                                    <div className="grid grid-cols-3 gap-2 mb-3">
                                                                        {['xs','s','m','l','xl','xxl'].map(t => <div key={t}><label className="text-xs uppercase block mb-1">{t}</label><input type="number" min="0" value={productoEditando[`stock_${t}`]} onChange={(e)=>setProductoEditando({...productoEditando,[`stock_${t}`]:e.target.value})} className="border rounded px-2 py-1 w-full text-sm"/></div>)}
                                                                    </div>
                                                                    <div className="flex gap-2">
                                                                        <button onClick={actualizarProducto} className="flex-1 btn-primary px-3 py-1 rounded text-sm">💾 Guardar</button>
                                                                        <button onClick={()=>setProductoEditando(null)} className="flex-1 bg-gray-500 text-white px-3 py-1 rounded text-sm">Cancelar</button>
                                                                    </div>
                                                                </div>
                                                            ) : <div className="text-sm text-gray-600"><p>Stock: XS:{producto.stock_xs} S:{producto.stock_s} M:{producto.stock_m} L:{producto.stock_l} XL:{producto.stock_xl} XXL:{producto.stock_xxl}</p></div>}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                        {carrito.length>0 && !isAdmin && (
                                            <div className="border-t pt-6">
                                                <h3 className="font-bold mb-3">🛒 Carrito ({carrito.length})</h3>
                                                {carrito.map((item,i) => <div key={i} className="flex justify-between items-center mb-2 p-2 bg-gray-50 rounded"><span>{item.nombre} - {item.talla} - {item.precio}€</span><button onClick={()=>eliminarDelCarrito(i)} className="text-red-600 px-2 py-1 rounded">✕</button></div>)}
                                                <div className="mt-4 flex justify-between items-center">
                                                    <span className="font-bold text-xl">Total: {carrito.reduce((s,i)=>s+i.precio,0)}€</span>
                                                    <button onClick={procesarCompra} className="btn-primary px-6 py-3 rounded">Finalizar Compra</button>
                                                </div>
                                            </div>
                                        )}
                                    </>
                                ) : (
                                    <div>
                                        <h3 className="font-bold text-lg mb-4">📦 Historial de Compras</h3>
                                        {compras.filter(c=>c.socio_id===currentSocio?.id).length===0 ? <div className="text-center py-12 text-gray-500"><p className="text-6xl mb-4">🛍️</p><p>No has realizado compras aún</p></div> : (
                                            <div className="space-y-4">
                                                {compras.filter(c=>c.socio_id===currentSocio?.id).map(compra => {
                                                    const items = typeof compra.items==='string' ? JSON.parse(compra.items) : compra.items;
                                                    return <div key={compra.id} className="border rounded-lg p-4"><div className="flex justify-between items-center mb-3"><div><p className="font-semibold">Pedido #{compra.id.substring(0,8)}</p><p className="text-sm text-gray-600">📅 {compra.fecha}</p></div><p className="text-xl font-bold text-corp-primary">{compra.total}€</p></div><div className="space-y-2">{items.map((item,i)=><div key={i} className="flex justify-between text-sm bg-gray-50 p-2 rounded"><span>{item.nombre} - Talla {item.talla}</span><span>{item.precio}€</span></div>)}</div></div>;
                                                })}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab==='strava' && (
                            <div className="bg-white rounded-lg shadow p-6">
                                <h2 className="text-2xl font-bold mb-4">Integración con Strava</h2>
                                {currentSocio?.strava_connected && currentSocio?.strava_access_token ? (
                                    <div>
                                        <div className="mb-4 p-4 bg-green-50 rounded flex justify-between items-center">
                                            <div><p className="font-semibold">✓ Conectado con Strava</p><button onClick={sincronizarStrava} className="btn-primary px-4 py-2 rounded mt-2">🔄 Sincronizar</button></div>
                                            <button onClick={desconectarStrava} className="bg-gray-500 text-white px-4 py-2 rounded">🔌 Desconectar Strava</button>
                                        </div>
                                        <h3 className="font-bold text-lg mb-3">Clasificación del Club</h3>
                                        <div className="overflow-x-auto">
                                        <table className="w-full text-sm">
                                            <thead className="bg-gray-100">
                                                <tr>
                                                    <th className="px-3 py-2 text-left">Pos</th>
                                                    <th className="px-3 py-2 text-left">Socio</th>
                                                    <th className="px-3 py-2 text-right bg-green-50">KM Año</th>
                                                    <th className="px-3 py-2 text-right bg-green-50">D+ Año</th>
                                                    <th className="px-3 py-2 text-right bg-green-50">Sal. Año</th>
                                                    <th className="px-3 py-2 text-right bg-blue-50">KM Mes</th>
                                                    <th className="px-3 py-2 text-right bg-blue-50">D+ Mes</th>
                                                    <th className="px-3 py-2 text-right bg-yellow-50">KM Sem</th>
                                                    <th className="px-3 py-2 text-right bg-yellow-50">D+ Sem</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {stravaStats.sort((a,b)=>b.km_ano-a.km_ano).map((stat,i) => (
                                                    <tr key={stat.id} className="border-b">
                                                        <td className="px-3 py-2">{i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}</td>
                                                        <td className="px-3 py-2">{stat.socios?.numero_socio?`#${stat.socios.numero_socio} `:''}{stat.socios?.nombre} {stat.socios?.apellidos}</td>
                                                        <td className="px-3 py-2 text-right bg-green-50 font-semibold">{stat.km_ano} km</td>
                                                        <td className="px-3 py-2 text-right bg-green-50">{stat.desnivel_ano||0} m</td>
                                                        <td className="px-3 py-2 text-right bg-green-50">{stat.salidas_ano||0}</td>
                                                        <td className="px-3 py-2 text-right bg-blue-50">{stat.km_mes} km</td>
                                                        <td className="px-3 py-2 text-right bg-blue-50">{stat.desnivel_mes} m</td>
                                                        <td className="px-3 py-2 text-right bg-yellow-50">{stat.km_semana||0} km</td>
                                                        <td className="px-3 py-2 text-right bg-yellow-50">{stat.desnivel_semana||0} m</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center">
                                        {!stravaClientId && <div className="mb-4 p-4 bg-yellow-50 rounded"><p className="mb-2">Configura las credenciales de Strava primero</p><button onClick={()=>setMostrarConfigStrava(true)} className="btn-secondary px-4 py-2 rounded">⚙️ Configurar</button></div>}
                                        {mostrarConfigStrava && (
                                            <div className="mb-4 p-4 border rounded text-left">
                                                <h3 className="font-bold mb-3">Configurar Strava API</h3>
                                                <input type="text" placeholder="Client ID (número)" value={stravaClientId} onChange={(e)=>setStravaClientId(e.target.value)} className="w-full border rounded px-3 py-2 mb-2"/>
                                                <input type="password" placeholder="Client Secret" value={stravaClientSecret} onChange={(e)=>setStravaClientSecret(e.target.value)} className="w-full border rounded px-3 py-2 mb-2"/>
                                                <button onClick={guardarCredencialesStrava} className="btn-primary px-4 py-2 rounded">💾 Guardar</button>
                                            </div>
                                        )}
                                        <button onClick={conectarConStrava} className="bg-orange-500 text-white px-6 py-3 rounded text-lg hover:bg-orange-600">Conectar con Strava</button>
                                        {currentSocio?.strava_access_token && <button onClick={desconectarStrava} className="bg-gray-500 text-white px-6 py-3 rounded text-lg ml-3">🔌 Desconectar</button>}
                                    </div>
                                )}
                            </div>
                        )}

                    </main>
                    <footer className="bg-corp-secondary text-white mt-12 py-8">
                        <div className="container mx-auto px-4 text-center">
                            <p>© 2025 Lin de Cubel - Club Ciclista</p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<ClubCiclistaApp />, document.getElementById('root'));
    </script>

    <script>
        // Desregistrar cualquier service worker antiguo para evitar caché rota
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
                regs.forEach(function(r) { r.unregister(); });
            });
            if (window.caches) {
                caches.keys().then(function(keys) {
                    keys.forEach(function(k) { caches.delete(k); });
                });
            }
        }
    </script>
</body>
</html>
